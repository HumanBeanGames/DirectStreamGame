# Copy this file to twitch.toml and fill in your private stream key.
# twitch.toml is ignored by git.

[twitch]
# Keep this false until you intentionally want plain `cargo run` to connect.
enabled = false

# Twitch channel to listen to for chat commands. This is your channel name,
# not the stream key.
channel = "your_channel_name"

# Optional chat bot login used for sending replies. Use a separate bot account
# if you do not want chat replies to come from your streamer account.
chat_bot_username = "your_bot_login"
chat_oauth_token = "oauth:your_chat_oauth_token_here"

# Twitch's global/default ingest endpoint. You can swap this for a specific
# endpoint from https://ingest.twitch.tv/ingests if needed.
ingest_server = "rtmp://live.twitch.tv/app"

# Find this in Twitch Creator Dashboard -> Settings -> Stream -> Primary Stream key.
stream_key = "live_your_stream_key_here"

# true sends to Twitch Inspector without making the stream viewable on your channel.
# Set false only when you actually want to go live.
bandwidth_test = true
